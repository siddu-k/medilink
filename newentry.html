<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediLink - Patient File Upload</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8f5e9 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.15);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid #1b5e20;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #1b5e20;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #c8e6c9;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="date"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #4caf50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .upload-section {
            margin-top: 30px;
            padding: 25px;
            background: #f1f8f6;
            border: 2px dashed #4caf50;
            border-radius: 8px;
            text-align: center;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-section h3 {
            color: #2e7d32;
            margin-bottom: 10px;
        }
        
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .file-label {
            display: inline-block;
            padding: 12px 30px;
            background: #4caf50;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
            margin: 10px 0;
        }
        
        .file-label:hover {
            background: #2e7d32;
        }
        
        .file-list {
            margin-top: 15px;
            text-align: left;
        }
        
        .file-item {
            background: white;
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #4caf50;
        }
        
        .file-item span {
            color: #1b5e20;
            font-size: 13px;
        }
        
        .remove-btn {
            background: #e53935;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 35px;
            justify-content: center;
        }
        
        button {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
            color: white;
            flex: 1;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.3);
        }
        
        .btn-reset {
            background: #e0e0e0;
            color: #424242;
            flex: 1;
        }
        
        .btn-reset:hover {
            background: #d0d0d0;
        }
        
        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 MediLink Patient Portal</h1>
            <p>Upload and manage patient medical records securely</p>
        </div>
        
        <div class="content">
            <form id="patientForm">
                <div class="row">
                    <div class="form-group">
                        <label for="patientId">Patient ID</label>
                        <input type="text" id="patientId" placeholder="Enter patient ID" required>
                    </div>
                    <div class="form-group">
                        <label for="patientName">Full Name</label>
                        <input type="text" id="patientName" placeholder="Enter patient name" required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="Enter phone number">
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter email address">
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="medicalHistory">Medical History</label>
                    <textarea id="medicalHistory" rows="4" placeholder="Enter relevant medical history..."></textarea>
                </div>
                
                <div class="upload-section">
                    <div class="upload-icon">📄</div>
                    <h3>Upload Medical Files</h3>
                    <p style="color: #666; font-size: 13px; margin-bottom: 15px;">PDF, JPG, PNG or DOC (Max 50MB)</p>
                    
                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
                        <label for="fileInput" class="file-label">Choose Files</label>
                    </div>
                    
                    <div class="file-list" id="fileList"></div>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn-submit">Upload & Save</button>
                    <button type="reset" class="btn-reset">Clear Form</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        let uploadedFiles = [];
        
        fileInput.addEventListener('change', (e) => {
            uploadedFiles = Array.from(e.target.files);
            displayFiles();
        });
        
        function displayFiles() {
            fileList.innerHTML = '';
            if (uploadedFiles.length > 0) {
                uploadedFiles.forEach((file, index) => {
                    const fileItem = document.createElement('div');
                    fileItem.className = 'file-item';
                    fileItem.innerHTML = `
                        <span>📎 ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)</span>
                        <button type="button" class="remove-btn" onclick="removeFile(${index})">Remove</button>
                    `;
                    fileList.appendChild(fileItem);
                });
            }
        }
        
        function removeFile(index) {
            uploadedFiles.splice(index, 1);
            fileInput.value = '';
            displayFiles();
        }
        
        document.getElementById('patientForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Patient files uploaded successfully!');
        });
    </script>
</body>
</html>
