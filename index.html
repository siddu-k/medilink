<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediLink - Secure Medical Records</title>
    <meta name="description"
        content="Unified medical ecosystem for patients and healthcare providers. NFC-powered health records.">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</head>

<body>
    <div id="app" class="min-h-screen flex items-center justify-center"
        style="background:linear-gradient(135deg,var(--emerald-50),var(--blue-50))">
        <div class="card anim-scale" style="max-width:26rem;width:100%;margin:1.5rem" id="authCard">
            <!-- Logo -->
            <div class="text-center p-10" style="padding-bottom:0">
                <div
                    style="width:4rem;height:4rem;background:linear-gradient(135deg,var(--emerald-400),var(--blue-500));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
                        <path
                            d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0016.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 002 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
                        <path
                            d="M12 5L9.04 7.96a2.17 2.17 0 000 3.08c.82.82 2.13.85 3 .07l2.07-1.9a2.82 2.82 0 013.79 0l2.96 2.66" />
                        <path d="M18 15l-2-2" />
                        <path d="M15 18l-2-2" />
                    </svg>
                </div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">MediLink</h1>
                <p class="text-slate-500 mt-2" style="font-size:.9rem">Secure Medical Records</p>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="p-10">
                <div style="display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem">
                    <div>
                        <label class="label">Email Address</label>
                        <input type="email" id="loginEmail" placeholder="your@email.com" class="input">
                    </div>
                    <div>
                        <label class="label">Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" class="input">
                    </div>
                    <div>
                        <label class="label">Login As</label>
                        <select id="loginRole" class="input">
                            <option value="patient">Patient</option>
                            <option value="hospital">Hospital Staff</option>
                            <option value="doctor">Doctor</option>
                        </select>
                    </div>
                </div>
                <button onclick="handleLogin()" class="btn btn-primary w-full" style="padding:1rem"
                    id="loginBtn">Login</button>
                <button onclick="showSignup()"
                    style="width:100%;padding:.75rem;background:none;border:none;color:var(--emerald-600);font-weight:700;cursor:pointer;font-family:inherit;margin-top:.5rem">Don't
                    have an account? Sign Up</button>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="p-10 hidden">
                <div style="display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem">
                    <div>
                        <label class="label">Full Name</label>
                        <input type="text" id="signupName" placeholder="Your Full Name" class="input">
                    </div>
                    <div>
                        <label class="label">Email Address</label>
                        <input type="email" id="signupEmail" placeholder="your@email.com" class="input">
                    </div>
                    <div>
                        <label class="label">Password</label>
                        <input type="password" id="signupPassword" placeholder="••••••••" class="input">
                    </div>
                    <div>
                        <label class="label">Register As</label>
                        <select id="signupRole" class="input">
                            <option value="patient">Patient</option>
                            <option value="hospital">Hospital Staff</option>
                            <option value="doctor">Doctor</option>
                        </select>
                    </div>
                </div>
                <button onclick="handleSignup()" class="btn btn-primary w-full" style="padding:1rem"
                    id="signupBtn">Create Account</button>
                <button onclick="showLogin()"
                    style="width:100%;padding:.75rem;background:none;border:none;color:var(--emerald-600);font-weight:700;cursor:pointer;font-family:inherit;margin-top:.5rem">Already
                    have an account? Login</button>
            </div>
        </div>
    </div>

    <script>
        function showLogin() { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('signupForm').classList.add('hidden'); }
        function showSignup() { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('signupForm').classList.remove('hidden'); }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { showToast('Please fill all fields', 'error'); return; }

            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Logging in...'; btn.disabled = true;

            const result = await loginUser(email, password);
            if (result) {
                showToast('Login successful!', 'success');
                setTimeout(() => redirectByRole(result.profile.role), 500);
            } else {
                btn.textContent = 'Login'; btn.disabled = false;
            }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const role = document.getElementById('signupRole').value;
            if (!name || !email || !password) { showToast('Please fill all fields', 'error'); return; }
            if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }

            const btn = document.getElementById('signupBtn');
            btn.textContent = 'Creating...'; btn.disabled = true;

            const result = await signupUser(email, password, name, role);
            if (result) {
                showToast('Account created! Check email for verification.', 'success');
                setTimeout(() => redirectByRole(result.profile.role), 1000);
            } else {
                btn.textContent = 'Create Account'; btn.disabled = false;
            }
        }

        // Auto-redirect if already logged in
        (async () => {
            const user = await getCurrentUser();
            if (user) redirectByRole(user.profile.role);
        })();
    </script>
</body>

</html>
