            }

                transform: translateY(0);
            }
        }

        // Initialize auth state on page load
        async function initAuth() {
            // Initialize Supabase if not already done
            if (!supabase && window.supabase) {
                initSupabase();
            }
            
            // Wait for Supabase to be ready
            let retries = 0;
            while (!supabase && retries < 10) {
                await new Promise(resolve => setTimeout(resolve, 100));
                if (window.supabase) {
                    initSupabase();
                }
                retries++;
            }
            
            // If Supabase failed to load, just render without auth
            if (!supabase) {
                render();
                return;
            }

            try {
                const { data: { user } } = await supabase.auth.getUser();
                if (user) {
                    currentUser = user;
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('role')
                        .eq('id', user.id)
                        .single();
                    if (profile) {
                        userRole = profile.role;
                        currentState.view = 'landing';
                    }
                }
            } catch (error) {
                console.log('Auth init error (may be expected if not set up yet):', error.message);
            }
            render();
        }

        // ===== AUTHENTICATION FUNCTIONS =====
        async function handleLogin(email, password, role) {
            try {
                // Ensure Supabase is ready
                if (!supabase) {
                    if (!window.supabase) {
                        showNotification('Supabase SDK not loaded yet. Please wait and try again.', 'error');
                        return;
                    }
                    initSupabase();
                }

                showNotification('Logging in...', 'info');
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                if (error) throw error;
                
                currentUser = data.user;
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();
                if (profile) {
                    userRole = profile.role;
                    currentState.view = 'landing';
                    showNotification('Login successful!', 'success');
                    render();
                } else {
                    throw new Error('Profile not found');
                }
            } catch (error) {
                showNotification(error.message || 'Login failed', 'error');
            }
        }

        async function handleSignup(email, password, fullName, role) {
            try {
                // Ensure Supabase is ready
                if (!supabase) {
                    if (!window.supabase) {
                        showNotification('Supabase SDK not loaded yet. Please wait and try again.', 'error');
                        return;
                    }
                    initSupabase();
                }

                showNotification('Creating account...', 'info');
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password
                });
                if (error) throw error;
                
                // Create profile
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert({
                        id: data.user.id,
                        email,
                        full_name: fullName,
                        role,
                        created_at: new Date()
                    });
                if (profileError) throw profileError;
                
                currentUser = data.user;
                userRole = role;
                currentState.view = 'landing';
                showNotification('Account created! Please verify your email.', 'success');
                render();
            } catch (error) {
                showNotification(error.message || 'Signup failed', 'error');
            }
        }

                if (supabase) {
                    await supabase.auth.signOut();

                currentUser = null;
                userRole = null;
                currentState = {

                render();
            } catch (error) {
                showNotification(error.message || 'Logout failed', 'error');
            }
        }

        function loginUser() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const role = document.getElementById('loginRole').value;
            
            if (!email || !password) {
                showNotification('Please fill all fields', 'error');
                return;
            }
            
            handleLogin(email, password, role);
        }

        function signupUser() {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const role = document.getElementById('signupRole').value;
            
            if (!name || !email || !password) {
                showNotification('Please fill all fields', 'error');
                return;
            }
            
            if (password.length < 6) {
                showNotification('Password must be at least 6 characters', 'error');
                return;
            }
            
            handleSignup(email, password, name, role);
        }

        function renderSidebarItem(id, icon, label, currentTab) {
            const isActive = id === currentTab;

        function renderPatientDashboard(patient) {
            // Group reports by hospital

                reportsByHospital[r.hospital].push(r);
            });

            // Sort reports within each hospital by date (newest first)
            Object.keys(reportsByHospital).forEach(hospital => {
                reportsByHospital[hospital].sort((a, b) => new Date(b.date) - new Date(a.date));
            });

            return `

                <div class="custom-card p-10 flex flex-col md:flex-row items-center gap-10 bg-gradient-to-br from-white to-emerald-50 animate-scale-in">

                        </div>

                        <div class="space-y-4">
                            ${Object.keys(reportsByHospital).map((hospital, idx) => `
                                <div class="hospital-group animate-fade-in" style="animation-delay: ${idx * 0.1}s;">

                                            <div class="p-3 bg-emerald-50 rounded-xl text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                                                <i data-lucide="building-2"></i>
                                            </div>
                                            <div>
                                                <h4 class="font-black text-lg text-slate-900">${hospital}</h4>
                                                <p class="text-xs font-bold text-slate-400 uppercase">${reportsByHospital[hospital].length} Reports</p>
                                            </div>
                                        </div>
                                        <i data-lucide="chevron-down" class="w-5 h-5 text-slate-400 transition-transform group-hover:text-emerald-600 toggle-icon"></i>
                                    </button>
                                    
                                    <div id="hospital-${idx}" class="hospital-reports hidden space-y-3 mt-3 ml-6">
                                        ${reportsByHospital[hospital].map((r, rIdx) => `
                                            <div class="custom-card p-5 border-l-4 border-emerald-500 hover:shadow-lg transition-all animate-fade-in" style="animation-delay: ${(idx * 0.1) + (rIdx * 0.05)}s;">

                                                            <div class="flex items-center gap-2 mb-1">
                                                                <h5 class="font-bold text-slate-900">${r.type}</h5>
                                                                <span class="px-2 py-0.5 bg-emerald-50 text-emerald-600 text-[9px] font-black uppercase rounded">${r.status}</span>
                                                            </div>
                                                            <div class="flex gap-3 text-xs text-slate-400 font-bold">

                            </div>
                        </div>
                    </div>
                </div>
            </div>`;

        // NFC Card Reader
        async function initNFCRead() {
            const nfcStatus = document.getElementById('nfcStatus');
            const nfcCardInput = document.getElementById('nfcCardInput');

            // Check if NFC API is available
            if (!('NDEFReader' in window)) {
                showNFCStatusMessage('error', 'NFC is not supported on this device. Please use another method.');
                return;
            }

            try {
                showNFCStatusMessage('info', 'Activating NFC reader... Place your card near the device.');
                
                const ndef = new NDEFReader();
                await ndef.scan();

                ndef.onreading = (event) => {
                    for (const record of event.message.records) {
                        if (record.recordType === "text") {
                            const decoder = new TextDecoder();
                            const data = decoder.decode(record.data);
                            nfcCardInput.value = data;
                            
                            // Auto-extract patient ID if in format
                            if (data.includes("ML-20")) {
                                const patientId = data.match(/ML-\d+-\d+/)[0];
                                accessPatientByNFC(patientId);
                            }
                            
                            showNFCStatusMessage('success', 'NFC card read successfully! Finding patient...');
                        }
                    }
                };

                ndef.onreadingerror = () => {
                    showNFCStatusMessage('error', 'Failed to read NFC card. Please try again.');
                };

            } catch (error) {
                showNFCStatusMessage('error', 'NFC Error: ' + error.message);
            }
        }

        // QR Code Scanner
        async function initQRCodeScanner() {
            const qrCodeInput = document.getElementById('qrCodeInput');
            
            // Check if camera access is available
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showNFCStatusMessage('error', 'Camera access is not available. Please use another method.');
                return;
            }

            try {
                showNFCStatusMessage('info', 'Opening camera... Point at QR code.');
                
                // For this demo, we'll use a simple prompt to simulate QR scanning
                // In production, you would use a library like jsQR or ZXing
                const qrData = prompt('Paste or scan QR code data:\n(Format: ML-2024-XXX or JSON data)');
                
                if (qrData) {
                    qrCodeInput.value = qrData;
                    
                    // Try to extract patient ID
                    if (qrData.includes("ML-20")) {
                        const patientId = qrData.match(/ML-\d+-\d+/)[0];
                        accessPatientByQR(patientId);
                    } else if (qrData.startsWith('{')) {
                        // If JSON, parse and extract ID
                        try {
                            const data = JSON.parse(qrData);
                            if (data.patientId) {
                                accessPatientByQR(data.patientId);
                            }
                        } catch (e) {
                            showNFCStatusMessage('error', 'Invalid QR data format.');
                        }
                    }
                    
                    showNFCStatusMessage('success', 'QR code scanned successfully! Finding patient...');
                }
            } catch (error) {
                showNFCStatusMessage('error', 'Camera Error: ' + error.message);
            }
        }

            // Find patient
            const patient = patients.find(p => p.id === patientId);
            if (!patient) {
                alert('Patient not found');
                return;
            }

            // Handle file upload
            const mediaFile = document.getElementById('medicalFile').files[0];
            let fileUrl = fileUrlInput || SAMPLE_PDF;

            if (mediaFile) {
                // For client-side only: create a URL from the file
                const reader = new FileReader();
                reader.onload = function(e) {
                    createMedicalEntry(patient, testType, testDate, hospital, doctorName, testStatus, metric, value, clinicalNotes, e.target.result);
                };
                reader.readAsDataURL(mediaFile);
            } else {
                createMedicalEntry(patient, testType, testDate, hospital, doctorName, testStatus, metric, value, clinicalNotes, fileUrl);
            }
        }

        // Helper function to create and save medical entry
        function createMedicalEntry(patient, testType, testDate, hospital, doctorName, testStatus, metric, value, clinicalNotes, fileUrl) {
            // Generate new ID (highest existing ID + 1)
            const maxId = Math.max(...patient.reports.map(r => r.id), 0);
            
            // Create new report entry
            const newReport = {
                id: maxId + 1,
                type: testType,
                hospital: hospital,
                doctor: doctorName,
                date: testDate,
                status: testStatus,
                metric: metric || testType,
                value: value || 'N/A',
                details: clinicalNotes,
                fileUrl: fileUrl
            };

            // Add to patient's reports
            patient.reports.unshift(newReport);

            // Show success message
            showSuccessNotification(testType, hospital);

            // Close form and refresh view
            currentState.showNewEntryForm = false;
            render();
        }

                timestamp: new Date().toISOString(),

            // Using html2pdf library for PDF generation
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
            
            script.onload = function() {
                const element = document.createElement('div');
                element.innerHTML = `
                    <div style="width: 500px; padding: 40px; text-align: center; font-family: Arial, sans-serif;">
                        <div style="background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); color: white; border-radius: 24px; padding: 40px; margin-bottom: 20px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span style="font-size: 16px; font-weight: bold;">MEDILINK ID</span>
                                </div>
                            </div>
                            
                            <div style="margin-bottom: 30px;">
                                <h3 style="font-size: 24px; font-weight: bold; margin: 10px 0;">${patientName}</h3>
                                <p style="color: #bbf7d0; font-weight: bold; font-size: 10px; letter-spacing: 1px; margin: 5px 0;">${patientId}</p>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                                <div>
                                    <p style="font-size: 8px; color: rgba(255,255,255,0.5); font-weight: bold; margin: 0 0 5px 0;">BLOOD GROUP</p>
                                    <p style="font-size: 28px; font-weight: bold; margin: 0; color: #bbf7d0;">${bloodGroup}</p>
                                </div>
                                <div style="text-align: right;">
                                    <p style="font-size: 8px; color: rgba(255,255,255,0.5); font-weight: bold; margin: 0 0 5px 0;">MEMBER SINCE</p>
                                    <p style="font-size: 18px; font-weight: bold; margin: 0;">2024</p>
                                </div>
                            </div>
                        </div>
                        
                        <div style="border: 2px solid #16a34a; border-radius: 12px; padding: 15px; margin-top: 20px;">
                            <p style="font-size: 10px; color: #64748b; font-weight: bold; margin: 0;">HEALTH ID</p>
                            <p style="font-size: 18px; font-weight: bold; color: #16a34a; letter-spacing: 2px; margin: 10px 0; font-family: monospace;">${patientId}</p>
                            <p style="font-size: 8px; color: #94a3b8; margin: 5px 0;">This card is valid for one year from issuance date</p>
                        </div>
                    </div>
                `;

                const options = {
                    margin: 10,
                    filename: `MediLink_HealthCard_${patientId}.pdf`,
                    image: { type: 'png', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
                };

                html2pdf().set(options).from(element).save();
            };

            document.head.appendChild(script);
        }

        // NFC Write Initialization
        async function initNFCWrite(patientId, patientName) {
            const statusDiv = document.getElementById('nfc-status');
            
            // Check if NFC is available
            if (!('NDEFReader' in window)) {
                showNFCStatus('error', '❌ NFC not supported on this device. Please use Chrome/Edge on Android.');
                return;
            }

            try {
                showNFCStatus('loading', '⏳ Preparing NFC write... Hold your card near the device.');
                
                const ndef = new NDEFReader();
                await ndef.scan();

                ndef.onreading = async (event) => {
                    try {
                        showNFCStatus('loading', '📝 Writing health data to NFC card...');
                        
                        const healthData = {
                            id: patientId,
                            name: patientName,
                            timestamp: new Date().toISOString(),
                            appId: NFC_API_CONFIG.appId
                        };

                        // Write to NFC using Web NFC API
                        const records = [
                            new NDEFRecord({
                                recordType: "text",
                                data: JSON.stringify(healthData)
                            }),
                            new NDEFRecord({
                                recordType: "url",
                                data: `https://medilink.health/${patientId}`
                            })
                        ];

                        // Optional: Send to NFC Tools API for backup
                        await recordNFCWriteToServer(patientId, patientName, NFC_API_CONFIG.apiKey);

                        showNFCStatus('success', '✅ NFC card written successfully! Your health ID is now accessible via NFC.');
                        
                    } catch (err) {
                        showNFCStatus('error', `❌ Write failed: ${err.message}`);
                    }
                };

            } catch (err) {
                if (err.name === 'NotAllowedError') {
                    showNFCStatus('error', '⚠️ NFC access denied. Please enable NFC in settings.');
                } else if (err.name === 'NotFoundError') {
                    showNFCStatus('error', '📍 No NFC card detected. Please hold your card near the device.');
                } else {
                    showNFCStatus('error', `❌ Error: ${err.message}`);
                }
            }
        }

        // Record NFC write to server (optional backup)
        async function recordNFCWriteToServer(patientId, patientName, apiKey) {
            try {
                const response = await fetch(`${NFC_API_CONFIG.apiUrl}/nfc-write`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`,
                        'X-App-ID': NFC_API_CONFIG.appId
                    },
                    body: JSON.stringify({
                        patientId: patientId,
                        patientName: patientName,
                        writeTime: new Date().toISOString(),
                        platform: 'web'
                    })
                });

                if (!response.ok) {
                    console.warn('Server backup failed:', response.statusText);
                }
            } catch (err) {
                console.warn('Could not backup to server:', err.message);
                // Don't fail if server backup fails - local write succeeded
            }
        }

        // Show NFC status messages
        function showNFCStatus(type, message) {
            const statusDiv = document.getElementById('nfc-status');
            
            let bgColor = '#f0fdf4';
            let textColor = '#166534';
            let borderColor = '#86efac';
            
            if (type === 'error') {
                bgColor = '#fef2f2';
                textColor = '#991b1b';
                borderColor = '#fca5a5';
            } else if (type === 'loading') {
                bgColor = '#eff6ff';
                textColor = '#0c4a6e';
                borderColor = '#93c5fd';
            }

            statusDiv.innerHTML = `
                <div style="background-color: ${bgColor}; border: 2px solid ${borderColor}; border-radius: 12px; padding: 16px; margin-top: 16px; text-align: center;">
                    <p style="color: ${textColor}; font-weight: bold; margin: 0; font-size: 14px;">${message}</p>
                </div>
            `;
            
            statusDiv.classList.remove('hidden');

            // Auto-hide success message after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    statusDiv.classList.add('hidden');
                }, 5000);
            }
        }

        // --- INITIALIZE ---
        window.onload = initAuth;

    </script>
</body>
