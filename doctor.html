<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - MediLink</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</head>

<body>
    <div class="navbar items-center justify-between">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0016.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 002 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
                <path d="M12 5L9.04 7.96a2.17 2.17 0 000 3.08c.82.82 2.13.85 3 .07l2.07-1.9a2.82 2.82 0 013.79 0l2.96 2.66" />
                <path d="M18 15l-2-2" />
                <path d="M15 18l-2-2" />
            </svg>
            MediLink Doctor
        </div>
        <div id="userNav"></div>
    </div>

    <div class="flex">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav style="display:flex;flex-direction:column;gap:.5rem">
                <button class="sidebar-link active" onclick="switchTab('dashboard', this)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="9" />
                        <rect x="14" y="3" width="7" height="5" />
                        <rect x="14" y="12" width="7" height="9" />
                        <rect x="3" y="16" width="7" height="5" />
                    </svg>
                    Dashboard
                </button>
                <button class="sidebar-link" onclick="switchTab('patients', this)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 00-3-3.87" />
                        <path d="M16 3.13a4 4 0 010 7.75" />
                    </svg>
                    My Patients
                </button>
                <button class="sidebar-link" onclick="switchTab('appointments', this)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    Appointments
                </button>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8" style="max-height:calc(100vh - 65px);overflow-y:auto;padding-bottom:5rem">
            <div class="loading-screen" id="loadingScreen">
                <div class="spinner"></div>
            </div>

            <div id="contentArea" class="hidden">

                <!-- Dashboard Tab -->
                <div id="tab-dashboard" class="anim-fade hidden">
                    <div class="card p-8 mb-8" style="background:var(--blue-600);color:#fff">
                        <div class="flex items-center gap-6 flex-wrap">
                            <div style="width:5rem;height:5rem;background:rgba(255,255,255,.2);border-radius:1rem;display:flex;align-items:center;justify-content:center">
                                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </div>
                            <div>
                                <h1 class="text-3xl font-black" id="doctorName">Loading...</h1>
                                <p class="font-bold opacity-80" id="doctorSpecialty"></p>
                                <p class="font-bold opacity-60 text-sm" id="doctorHospital"></p>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-3 gap-6 mb-8">
                        <div class="stat-card">
                            <div class="stat-label">My Patients</div>
                            <div class="stat-value text-blue" id="statPatients">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Today's Appointments</div>
                            <div class="stat-value text-emerald" id="statToday">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Pending Appointments</div>
                            <div class="stat-value" style="color:var(--amber-500)" id="statPending">0</div>
                        </div>
                    </div>

                    <div class="grid grid-2 gap-6">
                        <div class="card p-6">
                            <h3 class="font-black text-slate-900 mb-4 uppercase text-sm">Recent Patients</h3>
                            <div id="recentPatientsList" class="flex flex-col gap-3"></div>
                        </div>
                        <div class="card p-6">
                            <h3 class="font-black text-slate-900 mb-4 uppercase text-sm">Today's Schedule</h3>
                            <div id="todayApptsList" class="flex flex-col gap-3"></div>
                        </div>
                    </div>
                </div>

                <!-- Patients Tab -->
                <div id="tab-patients" class="anim-fade hidden">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-black text-slate-900">My Patients</h2>
                    </div>
                    <div class="card overflow-x-auto">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Patient ID</th>
                                    <th>Name</th>
                                    <th>Age</th>
                                    <th>Blood Group</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="patientsBody"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Appointments Tab -->
                <div id="tab-appointments" class="anim-fade hidden">
                    <h2 class="text-2xl font-black text-slate-900 mb-6">Appointments</h2>
                    <div class="grid grid-3 gap-4" id="apptsGrid"></div>
                </div>

            </div>
        </main>
    </div>

    <!-- Mobile Bottom Nav -->
    <div class="mobile-nav" id="mobileNav">
        <div class="mobile-nav-inner">
            <button class="mobile-nav-btn active" onclick="switchTab('dashboard', this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                Home
            </button>
            <button class="mobile-nav-btn" onclick="switchTab('patients', this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                Patients
            </button>
            <button class="mobile-nav-btn" onclick="switchTab('appointments', this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Appts
            </button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let doctorRecord = null;
        let myPatients = [];
        let myAppointments = [];
        const today = new Date().toISOString().split('T')[0];

        async function init() {
            currentUser = await requireAuth(['doctor']);
            if (!currentUser) return;

            renderUserNav(currentUser.profile, 'userNav');

            const sb = getSupabase();

            // Find doctor record linked to this user
            doctorRecord = await findDoctorByUserId(currentUser.user.id);

            // If no doctor record yet, create one
            if (!doctorRecord && sb) {
                const { data: newDoc } = await sb.from('doctors').insert({
                    user_id: currentUser.user.id,
                    name: currentUser.profile.full_name,
                    specialty: 'General',
                    hospital: 'MediLink Hospital'
                }).select().single();
                doctorRecord = newDoc;
            }

            if (doctorRecord) {
                // Fetch linked patients
                const links = await fetchDoctorPatients(doctorRecord.id);
                myPatients = links.map(l => l.patients).filter(Boolean);

                // Fetch appointments for this doctor
                if (sb) {
                    const { data: appts } = await sb.from('appointments')
                        .select('*')
                        .eq('doctor_id', doctorRecord.id)
                        .order('appointment_date', { ascending: true });
                    myAppointments = appts || [];
                }
            }

            renderDashboard();
            renderPatients();
            renderAppointments();

            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('contentArea').classList.remove('hidden');
            switchTab('dashboard', document.querySelector('.sidebar-link'));
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.mobile-nav-btn').forEach(l => l.classList.remove('active'));
            if (btn) btn.classList.add('active');
            ['dashboard', 'patients', 'appointments'].forEach(id => {
                document.getElementById('tab-' + id).classList.add('hidden');
            });
            document.getElementById('tab-' + tabId).classList.remove('hidden');
        }

        function renderDashboard() {
            document.getElementById('doctorName').textContent = 'Dr. ' + (doctorRecord ? doctorRecord.name : currentUser.profile.full_name);
            document.getElementById('doctorSpecialty').textContent = doctorRecord?.specialty || 'General';
            document.getElementById('doctorHospital').textContent = doctorRecord?.hospital || '';

            const todayAppts = myAppointments.filter(a => a.appointment_date === today);
            const pendingAppts = myAppointments.filter(a => a.status === 'Pending');

            document.getElementById('statPatients').textContent = myPatients.length;
            document.getElementById('statToday').textContent = todayAppts.length;
            document.getElementById('statPending').textContent = pendingAppts.length;

            // Recent patients
            const recentList = document.getElementById('recentPatientsList');
            recentList.innerHTML = myPatients.slice(0, 4).map(p => `
                <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
                    <div class="flex items-center gap-3">
                        <img src="${p.photo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(p.name)}" style="width:2.5rem;height:2.5rem;border-radius:.75rem;object-fit:cover">
                        <div>
                            <div class="font-bold text-sm text-slate-900">${p.name}</div>
                            <div class="text-xs text-slate-500 font-bold">${p.id} · ${p.blood_group || 'N/A'}</div>
                        </div>
                    </div>
                    <button onclick="window.open('profile.html?id=${p.id}')" class="btn btn-outline btn-sm">View</button>
                </div>
            `).join('') || '<div class="text-slate-500 text-sm font-bold">No patients linked yet.<br><span style="font-weight:400">Patients link to you when they scan their NFC card.</span></div>';

            // Today's appointments
            const todayList = document.getElementById('todayApptsList');
            todayList.innerHTML = todayAppts.map(a => `
                <div class="flex items-center justify-between p-3 bg-blue-50 rounded-xl border border-blue-100">
                    <div>
                        <div class="font-bold text-sm text-slate-900">${a.doctor_name || 'Patient'}</div>
                        <div class="text-xs text-slate-500 font-bold">${a.appointment_time}</div>
                    </div>
                    <span class="badge ${a.status === 'Confirmed' ? 'badge-green' : 'badge-amber'}">${a.status}</span>
                </div>
            `).join('') || '<p class="text-slate-500 text-sm font-bold">No appointments today</p>';
        }

        function renderPatients() {
            document.getElementById('patientsBody').innerHTML = myPatients.map(p => `
                <tr>
                    <td class="font-bold text-emerald">${p.id}</td>
                    <td class="font-black text-slate-900">
                        <div class="flex items-center gap-3">
                            <img src="${p.photo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(p.name)}" style="width:2rem;height:2rem;border-radius:.5rem;object-fit:cover">
                            ${p.name}
                        </div>
                    </td>
                    <td class="text-slate-500 font-bold">${p.age || '-'}</td>
                    <td><span class="badge badge-red">${p.blood_group || '-'}</span></td>
                    <td>
                        <button onclick="window.open('profile.html?id=${p.id}')" class="btn btn-outline btn-sm">View Profile</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="5" class="text-center font-bold text-slate-400" style="padding:2rem">No patients linked yet. Patients appear here after scanning their NFC card and logging in as you.</td></tr>';
        }

        function renderAppointments() {
            document.getElementById('apptsGrid').innerHTML = myAppointments.map(a => `
                <div class="card p-5">
                    <div class="flex justify-between items-start mb-3">
                        <span class="badge ${a.status === 'Confirmed' ? 'badge-green' : 'badge-amber'}">${a.status || 'Pending'}</span>
                        <div class="text-right">
                            <div class="font-black text-slate-900">${a.appointment_date}</div>
                            <div class="text-xs font-bold text-slate-500 uppercase tracking-wide">${a.appointment_time}</div>
                        </div>
                    </div>
                    <div class="font-bold text-slate-900">${a.doctor_name || 'Patient'}</div>
                    <div class="text-sm text-slate-500">${a.hospital || ''}</div>
                    ${a.appointment_date === today ? '<div class="mt-3"><span class="badge badge-blue">Today</span></div>' : ''}
                </div>
            `).join('') || '<div class="col-span-3 card p-8 text-center text-slate-400 font-bold">No appointments yet</div>';
        }

        init();
    </script>
</body>

</html>
